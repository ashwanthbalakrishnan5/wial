name: AI Site Edit

on:
  workflow_dispatch:
    inputs:
      chapter_slug:
        description: "Chapter slug (e.g., nigeria, usa)"
        required: true
        type: string
      prompt_text:
        description: "Natural language edit instruction"
        required: true
        type: string
      branch_name:
        description: "Branch to commit changes to"
        required: true
        type: string
      deployment_id:
        description: "Supabase deployment record ID for status updates"
        required: true
        type: string

permissions:
  contents: write

jobs:
  ai-edit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout existing branch
        run: |
          git fetch origin "${{ inputs.branch_name }}"
          git checkout "${{ inputs.branch_name }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update deployment status to building
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "building"}'

      - name: Run AI edit on chapter folder
        run: |
          CHAPTER_DIR="apps/chapter-${{ inputs.chapter_slug }}"

          if [ ! -d "$CHAPTER_DIR" ]; then
            echo "Error: Chapter folder $CHAPTER_DIR does not exist"
            exit 1
          fi

          echo "Working directory: $CHAPTER_DIR"

          # Collect context: chapter files for the AI
          CHAPTER_FILES=$(find "$CHAPTER_DIR/src" -type f \( -name "*.astro" -o -name "*.ts" -o -name "*.css" \) 2>/dev/null | head -40)

          # Also collect template-core files so the AI knows what shared components exist
          TEMPLATE_CORE_FILES=$(find "packages/template-core/src" -type f \( -name "*.astro" -o -name "*.ts" \) 2>/dev/null | head -30)

          # Read chapter files for context (limited to avoid token overflow)
          CONTEXT=""
          for f in $CHAPTER_FILES; do
            if [ -f "$f" ]; then
              CONTENT=$(head -100 "$f")
              CONTEXT="$CONTEXT

          --- FILE: $f ---
          $CONTENT"
            fi
          done

          # Read template-core files as read-only reference context
          TEMPLATE_CONTEXT=""
          for f in $TEMPLATE_CORE_FILES; do
            if [ -f "$f" ]; then
              CONTENT=$(head -80 "$f")
              TEMPLATE_CONTEXT="$TEMPLATE_CONTEXT

          --- SHARED (read-only): $f ---
          $CONTENT"
            fi
          done

          # Call Gemini API to generate edits
          ESCAPED_PROMPT=$(echo "${{ inputs.prompt_text }}" | jq -Rs .)
          ESCAPED_CONTEXT=$(echo "$CONTEXT" | jq -Rs .)
          ESCAPED_TEMPLATE_CONTEXT=$(echo "$TEMPLATE_CONTEXT" | jq -Rs .)

          REQUEST_BODY=$(cat <<GEMINI_EOF
          {
            "contents": [{
              "parts": [{
                "text": "You are an expert Astro/web developer. You are editing a WIAL chapter website.\n\nThe user wants the following change:\n${ESCAPED_PROMPT//\"/\\\"}\n\nHere are the current files in the chapter directory (you may edit these):\n${ESCAPED_CONTEXT//\"/\\\"}\n\nHere are shared template-core files (READ-ONLY reference — you can import from these but must NOT edit them):\n${ESCAPED_TEMPLATE_CONTEXT//\"/\\\"}\n\nIMPORTANT RULES:\n- Only create or modify files inside apps/chapter-${{ inputs.chapter_slug }}/\n- You can import shared components from @repo/template-core (e.g., layouts, components, utilities)\n- Do NOT output edits to packages/template-core/ or any other directory\n\nRespond with a JSON array of file edits. Each edit object has:\n- \"path\": the file path relative to the repo root (must start with apps/chapter-${{ inputs.chapter_slug }}/)\n- \"content\": the complete new file content\n\nOnly include files that need changes. Return valid JSON only, no markdown fences."
              }]
            }],
            "generationConfig": {
              "temperature": 0.2,
              "maxOutputTokens": 8192,
              "responseMimeType": "application/json"
            }
          }
          GEMINI_EOF
          )

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ env.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY")

          # Extract the text content from Gemini response
          EDITS=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$EDITS" ]; then
            echo "Error: No edits returned from AI"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            exit 1
          fi

          # Apply edits — strictly scoped to this chapter's folder only
          echo "$EDITS" | jq -c '.[]' | while read -r edit; do
            FILE_PATH=$(echo "$edit" | jq -r '.path')
            FILE_CONTENT=$(echo "$edit" | jq -r '.content')

            # Security: edits MUST be inside this chapter's directory only
            case "$FILE_PATH" in
              apps/chapter-${{ inputs.chapter_slug }}/*)
                echo "Applying edit to: $FILE_PATH"
                mkdir -p "$(dirname "$FILE_PATH")"
                echo "$FILE_CONTENT" > "$FILE_PATH"
                ;;
              *)
                echo "BLOCKED: Edit to $FILE_PATH is outside allowed scope (must be in apps/chapter-${{ inputs.chapter_slug }}/)"
                ;;
            esac
          done

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "WIAL AI Editor"
          git config user.email "ai-editor@wial.ashwanthbk.com"
          git add -A
          git commit -m "AI edit: ${{ inputs.prompt_text }}"
          git push origin "${{ inputs.branch_name }}"

      - name: Construct preview URL
        if: steps.changes.outputs.has_changes == 'true'
        id: preview
        run: |
          # Cloudflare Pages branch preview URL pattern
          BRANCH_SLUG=$(echo "${{ inputs.branch_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | head -c 28)
          PREVIEW_URL="https://${BRANCH_SLUG}.wial-${{ inputs.chapter_slug }}.pages.dev"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Update deployment with preview URL
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\": \"deploying\", \"preview_url\": \"${{ steps.preview.outputs.preview_url }}\", \"approval_status\": \"pending\", \"commit_reference\": \"${{ inputs.branch_name }}\"}"

      - name: Update deployment on no changes
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "done", "error_message": "AI produced no file changes for this prompt.", "completed_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'

      - name: Update deployment on failure
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/deployments?id=eq.${{ inputs.deployment_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "failed", "error_message": "AI edit workflow failed. Check GitHub Actions logs.", "completed_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
